name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest

      - name: Generate SARIF smoke report
        run: python -m routesentry_next scan tests/fixtures/middleware_only_app --format sarif --out routesentry.sarif

      - name: Validate SARIF JSON
        run: python -m json.tool routesentry.sarif

