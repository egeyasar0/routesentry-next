name: RouteSentry Next
description: Static authorization-boundary triage for Next.js routes.

inputs:
  path:
    description: Path to scan
    default: "."
  format:
    description: "Output format: table, json, markdown, sarif"
    default: "sarif"
  output:
    description: Output file path
    default: "routesentry.sarif"
  fail-on:
    description: "Minimum severity that should fail the action: high, medium, low, none"
    default: "none"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install RouteSentry Next
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run RouteSentry Next
      shell: bash
      run: |
        set -euo pipefail
        args=(python -m routesentry_next scan "${{ inputs.path }}" --format "${{ inputs.format }}" --out "${{ inputs.output }}")
        if [ "${{ inputs.fail-on }}" != "none" ]; then
          args+=(--fail-on "${{ inputs.fail-on }}")
        fi
        "${args[@]}"
        echo "RouteSentry Next output written to ${{ inputs.output }}"

